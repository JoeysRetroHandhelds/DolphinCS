name: Android Debug Build

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;29.0.14206865"

      - name: Cache CMake build output
        uses: actions/cache@v4
        with:
          path: Source/Android/.cxx
          key: cxx-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'Source/Core/**/*.cpp', 'Source/Core/**/*.h') }}
          restore-keys: cxx-${{ runner.os }}-

      - name: Build debug APK
        working-directory: Source/Android
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/29.0.14206865

      - name: Delete existing pre-release
        run: gh release delete debug-preview --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-preview
          name: "Debug Preview"
          prerelease: true
          make_latest: false
          files: Source/Android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            **Debug build for testing — not for general use.**

            Branch: `master`
            Commit: ${{ github.sha }}

            ### What's in this build
            Adds a configurable user data storage location setting (Scoped Storage / Internal Storage / SD Card) with file migration between locations.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
